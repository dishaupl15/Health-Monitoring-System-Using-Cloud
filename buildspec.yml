version: 0.2

phases:

  install:
    runtime-versions:
      nodejs: 20

    commands:
      - echo "Entering frontend folder"
      - cd frontend

      - echo "Installing dependencies"
      - npm install

  build:
    commands:
      - echo "Building Vite frontend"
      - npm run build

artifacts:
  files:
    - '**/*'

  base-directory: frontend/dist