version: 0.2

phases:

  install:
    runtime-versions:
      nodejs: 20

    commands:
      - echo "Moving to frontend folder"

      - cd agentic-health-monitor/frontend

      - echo "Installing dependencies"
      - npm install

  build:
    commands:
      - echo "Building frontend"
      - npm run build

artifacts:
  files:
    - '**/*'

  base-directory: agentic-health-monitor/frontend/dist